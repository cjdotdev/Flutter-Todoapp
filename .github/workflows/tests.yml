name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - name: Symlink Isar native library
        run: |
          ISAR_LIB=$(find ~/.pub-cache -name "libisar.so" 2>/dev/null | head -1)
          if [ -n "$ISAR_LIB" ]; then
            ln -sf "$ISAR_LIB" libisar.so
          fi

      - run: flutter test
