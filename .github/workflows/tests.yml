name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - name: Symlink Isar native library
        run: |
          ISAR_DIR=$(python3 -c "import json; c=json.load(open('.dart_tool/package_config.json')); p=[p for p in c['packages'] if 'isar_community_flutter_libs' in p['name']][0]; print(p['rootUri'].replace('file://',''))")
          if [ -n "$ISAR_DIR" ] && [ -f "$ISAR_DIR/linux/libisar.so" ]; then
            ln -sf "$ISAR_DIR/linux/libisar.so" libisar.so
            echo "Symlinked $ISAR_DIR/linux/libisar.so"
          else
            echo "libisar.so not found in package_config.json path"
            find / -name "libisar.so" 2>/dev/null | head -1
          fi

      - run: flutter test
